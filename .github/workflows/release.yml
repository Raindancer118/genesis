name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vg-x86_64-linux
            ext: ""
            archive: tar
            cross: false

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vg-aarch64-linux
            ext: ""
            archive: tar
            cross: true

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: vg-x86_64-windows
            ext: ".exe"
            archive: zip
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install system deps (Linux native)
        if: ${{ !matrix.cross && matrix.os == 'ubuntu-latest' }}
        run: sudo apt-get install -y build-essential

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (tar.gz — Linux)
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/vg dist/vg
          tar -czf dist/${{ matrix.artifact }}.tar.gz -C dist vg
          sha256sum dist/${{ matrix.artifact }}.tar.gz > dist/${{ matrix.artifact }}.tar.gz.sha256

      - name: Package (zip — Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/vg.exe" "dist/vg.exe"
          Compress-Archive -Path "dist/vg.exe" -DestinationPath "dist/${{ matrix.artifact }}.zip"
          $hash = (Get-FileHash "dist/${{ matrix.artifact }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}.zip" | Out-File -Encoding ASCII "dist/${{ matrix.artifact }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Generate AI release notes
        id: notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import subprocess, json, urllib.request, os, sys

          version = os.environ.get('GITHUB_REF_NAME', 'latest')
          token   = os.environ['GITHUB_TOKEN']

          # Collect commits since previous tag (or last 20 if first release)
          try:
              prev = subprocess.check_output(
                  ['git', 'describe', '--tags', '--abbrev=0', 'HEAD^'],
                  stderr=subprocess.DEVNULL, text=True
              ).strip()
              commits = subprocess.check_output(
                  ['git', 'log', f'{prev}..HEAD', '--pretty=format:- %s'],
                  text=True
              ).strip()
          except Exception:
              commits = subprocess.check_output(
                  ['git', 'log', '--pretty=format:- %s', '-20'],
                  text=True
              ).strip()

          prompt = f"""Write concise, polished release notes for **Volantic Genesis {version}**.

          Commits included in this release:
          {commits[:2000]}

          Format as GitHub-flavoured Markdown:
          - Start with a 1–2 sentence summary of what this release brings.
          - Then group changes under headers using these emojis where applicable:
            ✨ Features, 🔧 Fixes, 🚀 Improvements, 🏗️ Internals
          - Keep bullet points brief and user-focused.
          - Do NOT include the version number or a top-level heading — just the body."""

          payload = json.dumps({
              "model": "gpt-4o-mini",
              "messages": [{"role": "user", "content": prompt}],
              "max_tokens": 600,
              "temperature": 0.4,
          }).encode()

          req = urllib.request.Request(
              'https://models.inference.ai.azure.com/chat/completions',
              data=payload,
              headers={
                  'Authorization': f'Bearer {token}',
                  'Content-Type': 'application/json',
              }
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  data   = json.loads(resp.read())
                  notes  = data['choices'][0]['message']['content'].strip()
          except Exception as e:
              print(f'::warning::GitHub Models API failed ({e}), falling back to git log', flush=True)
              notes = '## What\'s Changed\n\n' + commits

          # Append static install / download section
          downloads = """
          ## Downloads

          | Platform | File |
          |---|---|
          | Linux x86\\_64 | `vg-x86_64-linux.tar.gz` |
          | Linux ARM64  | `vg-aarch64-linux.tar.gz` |
          | Windows x64  | `vg-x86_64-windows.zip` |

          **Linux / macOS:**
          ```bash
          curl -fsSL https://raw.githubusercontent.com/Raindancer118/genesis/main/install.sh | bash
          ```

          **Windows (PowerShell):**
          ```powershell
          irm https://raw.githubusercontent.com/Raindancer118/genesis/main/install.ps1 | iex
          ```
          """

          full = notes + '\n' + downloads.strip()

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('notes<<NOTES_EOF\n')
              f.write(full)
              f.write('\nNOTES_EOF\n')
          PYEOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Volantic Genesis ${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          files: dist/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
